name: Bug Report
description: Report a reproducible MacExplorer problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0 build 22"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "macOS 14.x / 15.x"
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Mac Architecture
      options:
        - Apple Silicon
        - Intel
        - Universal build
        - Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Logs or Screenshots
      description: Remove private paths, file names, tokens, or personal data before uploading.
